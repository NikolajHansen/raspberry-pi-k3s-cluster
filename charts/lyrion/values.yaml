# NFS server hostname
nfsServer: atlas.example.com

# NFSv4 paths (relative to V4 root on atlas)
nfsConfigPath: /k3s/lyrion
nfsMusicPath: /media

# MetalLB VIP for the LoadBalancer service
vip: ""

# Hostname for the Ingress rule
hostname: lyrion.example.com

# Container image
image:
  repository: lmscommunity/lyrionmusicserver
  tag: "9.1.1"

# Timezone inside the container
timezone: Europe/Copenhagen

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1500Mi"
    cpu: "2000m"
