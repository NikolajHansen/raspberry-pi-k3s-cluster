apiVersion: v1
kind: Namespace
metadata:
  name: lyrion
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: lyrion-media-pv
spec:
  storageClassName: ""
  accessModes:
    - ReadOnlyMany
  capacity:
    storage: 100Gi
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - vers=4
    - hard
    - retrans=3
    - noatime
    - nodiratime
    - rsize=131072
    - wsize=131072
  nfs:
    server: {{ .Values.nfsServer }}
    path: {{ .Values.nfsMusicPath }}
    readOnly: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lyrion-media
  namespace: lyrion
spec:
  storageClassName: ""
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 100Gi
  volumeName: lyrion-media-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: lyrion-config-pv
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 10Gi
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - vers=4
    - hard
    - retrans=3
    - noatime
    - nodiratime
    - rsize=131072
    - wsize=131072
  nfs:
    server: {{ .Values.nfsServer }}
    path: {{ .Values.nfsConfigPath }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lyrion-config
  namespace: lyrion
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: lyrion-config-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lyrion
  namespace: lyrion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lyrion
  template:
    metadata:
      labels:
        app: lyrion
    spec:
      hostNetwork: true
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: check-mounts
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              echo "Checking NFS mounts..."
              for i in $(seq 1 30); do
                if touch /config/.probe 2>/dev/null && rm /config/.probe 2>/dev/null; then
                  echo "Config mount OK (writable)"
                  CONFIG_OK=1
                fi
                if ls /media/music > /dev/null 2>&1; then
                  echo "Media mount OK (readable)"
                  MEDIA_OK=1
                fi
                [ -n "$CONFIG_OK" ] && [ -n "$MEDIA_OK" ] && exit 0
                echo "Waiting for NFS mounts... ($i/30)"
                sleep 2
              done
              echo "ERROR: NFS mounts not ready after 60s"
              exit 1
          volumeMounts:
            - name: config
              mountPath: /config
            - name: music
              mountPath: /media
        - name: fix-sqlite-wal
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              apk add --quiet sqlite file
              for db in /config/prefs/*.db /config/cache/*.db; do
                [ -f "$db" ] || continue
                if file "$db" | grep -q SQLite; then
                  sqlite3 "$db" "PRAGMA wal_checkpoint(TRUNCATE);" 2>/dev/null \
                    && echo "Checkpointed WAL: $db" \
                    || echo "Checkpoint skipped (will recover on startup): $db"
                else
                  rm -f "$db" "${db}-wal" "${db}-shm" && echo "Removed corrupt: $db"
                fi
              done; true
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: lyrion
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          env:
            - name: TZ
              value: {{ .Values.timezone }}
            - name: MUSIC_DIR
              value: /media/music
            - name: EXTRA_ARGS
              value: "--playlistdir /config/playlists"
          ports:
            - name: web
              containerPort: 9000
              protocol: TCP
            - name: cli
              containerPort: 9090
              protocol: TCP
            - name: slimproto-tcp
              containerPort: 3483
              protocol: TCP
            - name: slimproto-udp
              containerPort: 3483
              protocol: UDP
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          lifecycle:
            preStop:
              exec:
                command:
                  - bash
                  - -c
                  - |
                    echo "stopserver" > /dev/tcp/localhost/9090 || true
                    for i in $(seq 1 30); do
                      pgrep -f slimserver.pl || break
                      sleep 1
                    done
                    sync
          readinessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: music
              mountPath: /media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: lyrion-config
        - name: music
          persistentVolumeClaim:
            claimName: lyrion-media
---
apiVersion: v1
kind: Service
metadata:
  name: lyrion
  namespace: lyrion
  annotations:
    metallb.universe.tf/loadBalancerIPs: {{ .Values.vip | quote }}
spec:
  type: LoadBalancer
  selector:
    app: lyrion
  ports:
    - name: web
      port: 80
      targetPort: 9000
      protocol: TCP
    - name: cli
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: slimproto-tcp
      port: 3483
      targetPort: 3483
      protocol: TCP
    - name: slimproto-udp
      port: 3483
      targetPort: 3483
      protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lyrion
  namespace: lyrion
spec:
  rules:
    - host: {{ .Values.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lyrion
                port:
                  number: 9000
