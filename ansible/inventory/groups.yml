all:
  children:
    masters:
      hosts:
        master01:
    workers:
      hosts:
        node01:
        node02:
        node03:
        node04:
        node05:
        node06:
        node07:
        node08:
        node09:
    nas:
      hosts:
        atlas:
          ansible_become_method: su
          ansible_become_user: root
          ansible_become_password: "{{ lookup('community.general.bitwarden', 'root user on atlas') }}"
          ansible_pipelining: false
  vars:
    ansible_user: system
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_ssh_common_args: '-o StrictHostKeyChecking=accept-new'
    ansible_become_password: "{{ lookup('community.general.bitwarden', 'k3s-cluster', field='ansible_become_password') }}"
