[defaults]
inventory       = inventory/groups.yml
# Run on all 10 nodes simultaneously (default is 5)
forks           = 10
# Free strategy: each host proceeds independently without waiting for others
strategy        = free
# Write full run log to ~/.ansible.log for inspection
log_path        = ~/.ansible.log

[ssh_connection]
ssh_args        = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
# Pipelining reduces SSH overhead; disabled globally because FreeBSD sudo breaks with it.
# Re-enable per host group via ansible_pipelining: true in group_vars.
pipelining      = False
