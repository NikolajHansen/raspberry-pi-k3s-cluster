[defaults]
inventory       = inventory/groups.yml
# Run on all 10 nodes simultaneously (default is 5)
forks           = 10
# Free strategy: each host proceeds independently without waiting for others
strategy        = free
# Reduce SSH overhead by reusing connections
pipelining      = True

[ssh_connection]
ssh_args        = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
