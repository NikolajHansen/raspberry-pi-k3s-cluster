---
# Configure the syslog-ng receiver jail on atlas (FreeBSD).
#
# This playbook runs as nikolaj (no become required). It renders the
# syslog-ng config and stages it at /tmp/syslog-ng.conf on atlas, then
# prints the 4 root commands needed to apply it.
#
# Run with: k3s-ansible atlas-syslog-config.yml
#
# After the playbook, SSH to atlas and run the printed commands as root:
#   ssh atlas.example.com && su -

- name: Stage syslog-ng config on atlas
  hosts: atlas
  become: false
  vars:
    log_root: /greenlake/k3s/logs
    jail_name: syslog
    jail_root: /area51/jails/syslog.barnabas.dk

  tasks:
    - name: Render syslog-ng config locally
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/syslog-ng.conf.j2"
        dest: /tmp/syslog-ng.conf.staged
        mode: "0644"
      delegate_to: localhost

    - name: Upload rendered config to atlas /tmp
      ansible.builtin.copy:
        src: /tmp/syslog-ng.conf.staged
        dest: /tmp/syslog-ng.conf
        mode: "0644"

    - name: Root commands to apply config
      ansible.builtin.debug:
        msg:
          - "Config staged at /tmp/syslog-ng.conf on atlas."
          - "SSH to atlas, su -, then run:"
          - ""
          - "  zfs create -p greenlake/k3s/logs"
          - "  mkdir -p {{ log_root }}/nodes {{ log_root }}/pods"
          - "  cp /tmp/syslog-ng.conf {{ jail_root }}/usr/local/etc/syslog-ng.conf"
          - "  jexec {{ jail_name }} service syslog-ng restart"
