---
# Configure the syslog-ng receiver jail on atlas (FreeBSD).
# Manages the syslog-ng config and log directory layout.
#
# Run with: k3s-ansible atlas-syslog-config.yml
# Or directly:
#   ansible-playbook -i ansible/inventory/groups.yml -i ~/k3s-inventory.yml \
#     -e @~/k3s-site.yml ansible/playbooks/atlas-syslog-config.yml

- name: Configure syslog-ng on atlas syslog jail
  hosts: atlas
  become: true
  gather_facts: false
  vars:
    ansible_become_password: "{{ lookup('community.general.bitwarden', 'nikolaj user on atlas') }}"
    log_root: /greenlake/k3s/logs
    jail_name: syslog
    jail_root: /area51/jails/syslog.barnabas.dk
    jail_fstab: /etc/fstab.syslog
    syslogng_conf_src: "{{ playbook_dir }}/../templates/syslog-ng.conf.j2"
    syslogng_conf_dst: "{{ jail_root }}/usr/local/etc/syslog-ng.conf"

  tasks:
    - name: Ensure ZFS log dataset exists
      community.general.zfs:
        name: greenlake/k3s/logs
        state: present

    - name: Ensure log directory structure exists under new path
      ansible.builtin.file:
        path: "{{ log_root }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - nodes
        - pods

    - name: Ensure jail fstab mounts new log path at /mnt/logs
      ansible.builtin.lineinfile:
        path: "{{ jail_fstab }}"
        regexp: '^\S+\s+{{ jail_root }}/mnt/logs'
        line: "{{ log_root }}\t{{ jail_root }}/mnt/logs\tnullfs\tro\t0\t0"
        create: true
        mode: "0644"
      notify: Remount jail logs

    - name: Deploy syslog-ng config to jail
      ansible.builtin.template:
        src: "{{ syslogng_conf_src }}"
        dest: "{{ syslogng_conf_dst }}"
        owner: root
        group: wheel
        mode: "0644"
      notify: Restart syslog-ng

    - name: Ensure syslog-ng is running inside the jail
      ansible.builtin.command:
        cmd: jexec {{ jail_name }} service syslog-ng status
      register: syslogng_status
      failed_when: false
      changed_when: false

    - name: Start syslog-ng if not running
      ansible.builtin.command:
        cmd: jexec {{ jail_name }} service syslog-ng start
      when: syslogng_status.rc != 0

  handlers:
    - name: Remount jail logs
      ansible.builtin.command:
        cmd: mount -a -F {{ jail_fstab }}
      listen: Remount jail logs

    - name: Restart syslog-ng
      ansible.builtin.command:
        cmd: jexec {{ jail_name }} service syslog-ng restart
