---
# Deploy Helm chart applications to the k3s cluster.
# Define helm_apps in ~/k3s-site.yml as `site_helm_apps`.
#
# Each entry supports:
#   name:       Release name
#   chart:      Chart reference (repo/chart)
#   repo:       Helm repo name
#   repo_url:   Helm repo URL
#   namespace:  Target namespace (created if missing)
#   values:     Dict of --set key=value overrides (optional)
#   version:    Chart version to pin (optional, omit for latest)

- name: Deploy Helm chart applications
  hosts: masters
  become: yes
  vars:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    helm_apps: "{{ site_helm_apps | default([]) }}"
  tasks:
    - name: Add Helm repos
      command: helm repo add {{ item.repo }} {{ item.repo_url }} --force-update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      loop: "{{ helm_apps }}"
      changed_when: false

    - name: Update Helm repos
      command: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Install/upgrade Helm charts
      command: >
        helm upgrade --install {{ item.name }} {{ item.chart }}
        --namespace {{ item.namespace }}
        --create-namespace
        {% if item.version is defined %}--version {{ item.version }}{% endif %}
        {% for k, v in (item.values | default({})).items() %}--set {{ k }}={{ v }} {% endfor %}
        --wait
        --timeout 10m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      loop: "{{ helm_apps }}"
      register: helm_result
      changed_when: "'has been upgraded' in helm_result.stdout or 'has been deployed' in helm_result.stdout"
