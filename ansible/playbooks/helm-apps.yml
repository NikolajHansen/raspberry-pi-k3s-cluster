---
# Deploy Helm chart applications to the k3s cluster.
# Add entries to `helm_apps` to install additional charts.
#
# Each entry supports:
#   name:       Release name
#   chart:      Chart reference (repo/chart)
#   repo:       Helm repo name
#   repo_url:   Helm repo URL
#   namespace:  Target namespace (created if missing)
#   values:     Dict of --set key=value overrides (optional)
#   version:    Chart version to pin (optional, omit for latest)

- name: Deploy Helm chart applications
  hosts: masters
  become: yes
  vars:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    helm_apps:
      # Harvester UI Extension for Rancher — adds Harvester cluster type to Rancher UI
      - name: harvester-ui-extension
        chart: harvester-ui-ext/harvester
        repo: harvester-ui-ext
        repo_url: https://harvester.github.io/harvester-ui-extension/
        namespace: cattle-ui-plugin-system
        version: "1.8.0"

      # Example — uncomment and extend as needed:
      # - name: my-app
      #   chart: myrepo/my-app
      #   repo: myrepo
      #   repo_url: https://charts.example.com
      #   namespace: my-namespace
      #   version: "1.2.3"
      #   values:
      #     service.type: LoadBalancer
      #     replicaCount: 2

  tasks:
    - name: Add Helm repos
      command: helm repo add {{ item.repo }} {{ item.repo_url }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      loop: "{{ helm_apps }}"
      changed_when: true

    - name: Update Helm repos
      command: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: true

    - name: Create namespaces
      command: kubectl --kubeconfig {{ kubeconfig }} create namespace {{ item.namespace }} --dry-run=client -o yaml | kubectl --kubeconfig {{ kubeconfig }} apply -f -
      loop: "{{ helm_apps }}"
      changed_when: true

    - name: Install/upgrade Helm charts
      command: >
        helm upgrade --install {{ item.name }} {{ item.chart }}
        --namespace {{ item.namespace }}
        --create-namespace
        {% if item.version is defined %}--version {{ item.version }}{% endif %}
        {% for k, v in (item.values | default({})).items() %}--set {{ k }}={{ v }} {% endfor %}
        --wait
        --timeout 10m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      loop: "{{ helm_apps }}"
      changed_when: true
