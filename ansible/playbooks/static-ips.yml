---
- name: Configure static IPs via NetworkManager
  hosts: all
  become: yes
  tasks:
    - name: Set static IP on eth0 via nmcli (fire and reconnect)
      shell: |
        nmcli connection modify "Wired connection 1" \
          ipv4.method manual \
          ipv4.addresses "{{ static_ip }}/24" \
          ipv4.gateway "{{ dns_external_ip }}" \
          ipv4.dns "{{ dns_external_ip }} {{ dns_internal_ip }}" \
          ipv4.dns-search "{{ internal_domain }}"
        nohup bash -c 'sleep 3 && nmcli connection up "Wired connection 1"' > /tmp/nmcli-up.log 2>&1 &
      async: 10
      poll: 0
