---
# Deploy Botkube for Kubernetes monitoring with Slack notifications
#
# Tokens are stored in Bitwarden — set via site vars or environment:
#   botkube_slack_bot_token: "xoxb-..."   # OAuth & Permissions → Bot Token
#   botkube_slack_app_token: "xapp-..."   # Socket Mode → App-Level Token
#   botkube_slack_channel: "k3s"
#   botkube_cluster_name: "raspberry-pi"
#
# Usage:
#   k3s-ansible botkube.yml

- name: Deploy Botkube
  hosts: masters
  become: yes
  vars:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    botkube_version: "1.14.0"
    botkube_slack_channel: "k3s"
    botkube_cluster_name: "raspberry-pi"
  tasks:
    - name: Add Botkube Helm repo
      command: helm repo add botkube https://charts.botkube.io --force-update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Update Helm repos
      command: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      changed_when: false

    - name: Deploy Botkube via Helm
      command: >
        helm upgrade --install botkube botkube/botkube
        --namespace botkube
        --create-namespace
        --set communications.default-group.socketSlack.enabled=true
        --set communications.default-group.socketSlack.channels.default.name={{ botkube_slack_channel }}
        --set communications.default-group.socketSlack.botToken={{ botkube_slack_bot_token }}
        --set communications.default-group.socketSlack.appToken={{ botkube_slack_app_token }}
        --set settings.clusterName={{ botkube_cluster_name }}
        --set plugins.repositories.botkube.url=https://github.com/kubeshop/botkube/releases/download/v{{ botkube_version }}/plugins-index.yaml
        --wait --timeout 3m
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: botkube_result
      changed_when: "'has been upgraded' in botkube_result.stdout or 'has been deployed' in botkube_result.stdout"
